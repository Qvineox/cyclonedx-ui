spec:
  inputs:
    environment:
      type: string
      rules:
        - if: $CI_COMMIT_TAG
          options:
            - "development"
            - "production"
          default: "production"
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          options:
            - "development"
            - "production"
          default: "development"
        - default: null

---

stages:
  - build

build docker image:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG
      changes:
        - ".gitlab-ci.yml"
        - "**/*.go"
        - "**/*.ts"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - |
      docker build --cache-from ${CI_REGISTRY_IMAGE} . \
        -t ${CI_REGISTRY_IMAGE}:latest \
        -f ./build/Dockerfile

    - docker push ${CI_REGISTRY_IMAGE}:latest
  tags:
    - docker